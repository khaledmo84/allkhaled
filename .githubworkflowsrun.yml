name: تشغيل البوت اليومي

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت المتطلبات
        run: pip install -r requirements.txt

      - name: تشغيل البوت
        run: python bot.py
