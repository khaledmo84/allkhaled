name: سير العمل اليدوي

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@8d9ed0ac5c8942c2a8b6b8945b6c866c5397e0f1  # v5.0.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python run.py
